  const date = start.split('T')[0];
  const timeStart = start.split('T')[1]?.slice(0,5) || '';
  const timeEnd = end !== start ? end.split('T')[1]?.slice(0,5) : '';
  const timeStr = timeStart && timeEnd && timeStart !== timeEnd ? timeStart + '–' + timeEnd : timeStart;
  const cycleStr = sc === ec ? `Cycle ${sc} Pass ${sp}` : `Cycle ${sc} P${sp} → ${ec} P${ep}`;
  
  const type = desc.includes('maneuver') || desc.includes('yaw flip') ? 'maneuver' :
               desc.includes('No ') || desc.includes('Suspicious') || desc.includes('anomaly') || desc.includes('SEU') ? 'anomaly' :
               desc.includes('Solar panel') ? 'panel' :
               desc.includes('Activate') || desc.includes('mask') || desc.includes('calibration phase') ? 'calib' :
               desc.includes('Gyro') ? 'gyro' : 'other';
  
  const color = type === 'anomaly' ? '#ff6b6b' :
                type === 'maneuver' ? '#58a6ff' :
                type === 'panel' ? '#ffa657' :
                type === 'calib' ? '#39d353' : '#8b949e';

  const div = document.createElement('div');
  div.className = 'event';
  div.dataset.filter = type;
  div.style.borderLeftColor = color;
  div.innerHTML = `
    <div class="date">${date}<br><small>${timeStr}</small></div>
    <div class="dot" style="background:${color}"></div>
    <div class="cycle">${cycleStr}</div>
    <div class="info">
      <div class="title">${desc.split('.')[0]}</div>
      <div class="desc">${desc}</div>
    </div>
    <div class="tooltip"><strong>Period:</strong> ${start} → ${end}<br><strong>Cycle/Pass:</strong> ${sc} ${sp} → ${ec} ${ep}<br><br>${desc}</div>
  `;
  div.onclick = () => div.querySelector('.tooltip').classList.toggle('show');
  document.getElementById('timeline').appendChild(div);
});

// Filter buttons
document.querySelectorAll('.filters button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.filter;
    document.querySelectorAll('.event').forEach(e => {
      e.style.display = (f === 'all' || e.dataset.filter === f) ? 'flex' : 'none';
    });
  };
});
